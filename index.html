<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=760" />
<title>버추얼 연간 캘린더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --paper:#fbf7f2;
    --ink:#2c2622;
    --ink-soft:#7d7168;
    --line:#e8e0d6;
    --card:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);}
  body{
    font-family:'Gowun Dodum', sans-serif;
    width:760px;
    margin:0 auto;
    padding:40px 28px 80px;
  }
  h1,h2,.month-name{font-family:'Jua', sans-serif; font-weight:400;}

  .top{ text-align:center; margin-bottom:26px; }
  .top h1{ font-size:32px; margin:0; }

  .chip-legend{
    display:flex; justify-content:center; gap:18px; margin:0 0 22px;
    font-size:13px; color:var(--ink-soft);
  }
  .chip-legend span{ display:flex; align-items:center; gap:5px; }

  .tabs{ display:flex; justify-content:center; gap:10px; margin:0 0 26px; }
  .tab-link{
    font-family:'Jua', sans-serif; font-size:14px; text-decoration:none;
    color:var(--ink-soft); background:var(--card); border:1px solid var(--line);
    padding:10px 20px; border-radius:20px; transition:all .15s ease;
    cursor:pointer; -webkit-appearance:none; appearance:none;
  }
  .tab-link:hover{ background:#f2ece3; }
  .tab-link.active{ background:var(--ink); color:#fff; border-color:var(--ink); }

  .panel{ display:none; }
  .panel.active{ display:block; }

  .section-title{
    display:flex; align-items:baseline; gap:10px;
    margin:0 0 16px;
  }
  .section-title h2{ font-size:21px; margin:0; }
  .section-title .sub{ font-size:13px; color:var(--ink-soft); }
  .section-title::after{
    content:""; flex:1; height:1px; background:var(--line);
  }

  .pager{
    display:flex; align-items:center; justify-content:center; gap:22px;
    margin-bottom:14px;
  }
  .pager-btn{
    width:42px; height:42px; border-radius:50%; border:1px solid var(--line);
    background:var(--card); color:var(--ink); font-size:22px; line-height:1;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background .15s ease;
  }
  .pager-btn:hover{ background:#f2ece3; }
  .pager-label{ display:flex; align-items:center; gap:10px; font-family:'Jua', sans-serif; font-size:24px; min-width:180px; justify-content:center; }
  .today-btn{
    font-family:'Gowun Dodum', sans-serif; font-size:12.5px; color:var(--ink-soft);
    background:var(--card); border:1px solid var(--line); border-radius:20px;
    padding:5px 12px; cursor:pointer;
  }
  .today-btn:hover{ background:#f2ece3; }

  .month-block{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:18px 20px 20px; margin-bottom:16px;
  }
  .month-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px; }
  .month-name{ font-size:20px; }
  .month-count{ font-size:13px; color:var(--ink-soft); }

  .dow-row, .cal-grid{
    display:grid; grid-template-columns:repeat(7,1fr); gap:5px;
  }
  .dow-row{ margin-bottom:6px; }
  .dow{ text-align:center; font-size:13px; color:var(--ink-soft); }
  .dow.sun{ color:#d9686f; } .dow.sat{ color:#4f8ef7; }

  .cell{
    min-height:96px; border-radius:9px; padding:5px 5px 6px;
    background:#faf8f4; position:relative;
  }
  .cell.empty{ background:transparent; }
  .cell .d{ font-size:12px; color:var(--ink-soft); }
  .cell.has-event{ background:#fffaf3; box-shadow:inset 0 0 0 1px var(--line); }
  .cell.today .d{ color:#fff; background:var(--ink); border-radius:50%; padding:1px 6px; }

  .chip{
    margin-top:4px; font-size:13px; line-height:1.35;
    padding:4px 6px; border-radius:10px; color:#fff;
    display:block; text-align:center;
  }
  .chip .l1{ display:block; font-weight:500; }
  .chip .l2{ display:block; font-size:11.5px; opacity:.9; }
  .chip.range{ box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.7); }

  .week-table{ width:100%; border-collapse:separate; border-spacing:0 7px; font-size:13px; }
  .week-table th{ font-size:12.5px; color:var(--ink-soft); font-weight:400; padding-bottom:6px; }
  .week-table th:first-child, .week-table td:first-child{ text-align:left; width:64px; }
  .week-table td{ text-align:center; vertical-align:middle; padding:3px; }
  .name-cell{ display:flex; align-items:center; gap:6px; font-size:14px; }
  .sched-chip{
    display:inline-block; min-width:56px; padding:6px 5px; border-radius:10px;
    font-size:12px; color:#fff; line-height:1.2;
  }
  .sched-chip.rest{ background:var(--line); color:var(--ink-soft); }
  .sched-chip.none{ background:transparent; color:#c8c0b6; font-size:13px; }
  .row-wrap{ background:var(--card); }
  .row-wrap td{ border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .row-wrap td:first-child{ border-left:1px solid var(--line); border-radius:12px 0 0 12px; }
  .row-wrap td:last-child{ border-right:1px solid var(--line); border-radius:0 12px 12px 0; }

  .note{ font-size:12.5px; color:var(--ink-soft); margin-top:14px; line-height:1.6; text-align:center; }
  .loading{ text-align:center; color:var(--ink-soft); font-size:13px; padding:40px 0; }
</style>
</head>
<body>

  <div class="top">
    <h1>버추얼 연간 캘린더</h1>
  </div>

  <div class="chip-legend">
    <span>🎂🎉 생일·주년</span>
    <span>🧳 기간 일정(휴가 등)</span>
  </div>

  <nav class="tabs">
    <button class="tab-link active" data-target="panelCal">🎂 기념일 캘린더</button>
    <button class="tab-link" data-target="panelSched">📡 방송 시간표</button>
  </nav>

  <div id="panelCal" class="panel active">
    <div class="section-title">
      <h2>🎂 기념일 캘린더</h2>
      <span class="sub">생일 · 데뷔 주년</span>
    </div>
    <div class="pager">
      <button id="prevBtn" class="pager-btn" aria-label="이전 달">‹</button>
      <div class="pager-label">
        <span id="pagerYear"></span>
        <button id="todayBtn" class="today-btn">오늘</button>
      </div>
      <button id="nextBtn" class="pager-btn" aria-label="다음 달">›</button>
    </div>
    <div id="months"><div class="loading">불러오는 중…</div></div>
  </div>

  <div id="panelSched" class="panel">
    <div class="section-title">
      <h2>📡 주간 방송 시간표</h2>
      <span class="sub">정규 방송 · 휴방</span>
    </div>
    <div class="month-block">
      <table class="week-table">
        <thead>
          <tr>
            <th></th>
            <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th><th>일</th>
          </tr>
        </thead>
        <tbody id="weekBody"><tr><td colspan="8" class="loading">불러오는 중…</td></tr></tbody>
      </table>
    </div>
  </div>

<script src="js/supabase-config.js"></script>
<script>
const DOW = ['월','화','수','목','금','토','일'];
const today = new Date();
let cur = { year: today.getFullYear(), month: today.getMonth() + 1 };

let STREAMERS = {};
let SPECIAL_DAYS = [];
let RANGE_EVENTS = [];
let WEEKLY = [];
const WEEKDAYS = ['월','화','수','목','금','토','일'];

function daysInMonth(y,m){ return new Date(y, m, 0).getDate(); }
function firstDowMon0(y,m){
  const jsDow = new Date(y, m-1, 1).getDay();
  return (jsDow + 6) % 7;
}

function renderMonths(){
  const { year, month } = cur;
  document.getElementById('pagerYear').textContent = `${year}년 ${month}월`;

  const total = daysInMonth(year, month);
  const startEmpty = firstDowMon0(year, month);
  const events = SPECIAL_DAYS.filter(e => e.month === month);
  const isCurMonth = year === today.getFullYear() && month === (today.getMonth() + 1);

  let cells = '';
  for(let i=0;i<startEmpty;i++) cells += `<div class="cell empty"></div>`;
  for(let day=1; day<=total; day++){
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dayEvents = events.filter(e => e.day === day);
    const dayRanges = RANGE_EVENTS.filter(r => dateStr >= r.start_date && dateStr <= r.end_date);
    const hasEvent = dayEvents.length > 0 || dayRanges.length > 0;
    const isToday = isCurMonth && day === today.getDate();
    const chips = dayEvents.map(e => {
      const s = STREAMERS[e.streamer_id] || { name:'?', color:'#999' };
      const icon = e.type === 'birthday' ? '🎂' : '🎉';
      const typeWord = e.type === 'birthday' ? '생일' : '주년';
      return `<span class="chip" style="background:${s.color}"><span class="l1">${icon} ${s.name}</span><span class="l2">${typeWord}</span></span>`;
    }).join('') + dayRanges.map(r => {
      const s = STREAMERS[r.streamer_id] || { name:'?', color:'#999' };
      return `<span class="chip range" style="background:${s.color}"><span class="l1">🧳 ${s.name}</span><span class="l2">${r.label}</span></span>`;
    }).join('');
    cells += `<div class="cell${hasEvent?' has-event':''}${isToday?' today':''}"><span class="d">${day}</span>${chips}</div>`;
  }

  const monthStart = `${year}-${String(month).padStart(2,'0')}-01`;
  const monthEnd = `${year}-${String(month).padStart(2,'0')}-${String(total).padStart(2,'0')}`;
  const monthRanges = RANGE_EVENTS.filter(r => r.start_date <= monthEnd && r.end_date >= monthStart);
  const summaryItems = events.map(e=>e.label || '').concat(monthRanges.map(r => `${(STREAMERS[r.streamer_id]||{}).name || ''} ${r.label}`));

  document.getElementById('months').innerHTML = `
    <div class="month-block">
      <div class="month-head">
        <span class="month-name">${month}월</span>
        <span class="month-count">${summaryItems.length ? summaryItems.join(' · ') : '기념일 없음'}</span>
      </div>
      <div class="dow-row">
        ${DOW.map((d,i)=>`<span class="dow${i===5?' sat':''}${i===6?' sun':''}">${d}</span>`).join('')}
      </div>
      <div class="cal-grid">${cells}</div>
    </div>`;
}

function changeMonth(delta){
  let m = cur.month + delta;
  let y = cur.year;
  if(m > 12){ m = 1; y += 1; }
  if(m < 1){ m = 12; y -= 1; }
  cur = { year: y, month: m };
  renderMonths();
}

document.getElementById('prevBtn').addEventListener('click', () => changeMonth(-1));
document.getElementById('nextBtn').addEventListener('click', () => changeMonth(1));
document.getElementById('todayBtn').addEventListener('click', () => {
  cur = { year: today.getFullYear(), month: today.getMonth() + 1 };
  renderMonths();
});

function renderWeek(){
  const streamers = Object.values(STREAMERS);
  const body = document.getElementById('weekBody');
  body.innerHTML = streamers.map(s => {
    const cells = WEEKDAYS.map((_, wd) => {
      const row = WEEKLY.find(w => w.streamer_id === s.id && w.weekday === wd);
      if(!row) return `<td><span class="sched-chip none">-</span></td>`;
      if(row.is_rest) return `<td><span class="sched-chip rest">휴방</span></td>`;
      const t = row.time ? row.time.slice(0,5) : '-';
      return `<td><span class="sched-chip" style="background:${s.color}">${t}</span></td>`;
    }).join('');
    return `<tr class="row-wrap">
      <td><span class="name-cell"><span style="width:10px;height:10px;border-radius:50%;background:${s.color};display:inline-block;flex:none"></span>${s.name}</span></td>
      ${cells}
    </tr>`;
  }).join('');
}

async function loadData(){
  const sb = initSupabase();
  const [{ data: streamers }, { data: days }, { data: ranges }, { data: weekly }] = await Promise.all([
    sb.from('streamers').select('*').order('sort_order'),
    sb.from('special_days').select('*'),
    sb.from('range_events').select('*'),
    sb.from('weekly_schedule').select('*')
  ]);
  STREAMERS = {};
  (streamers || []).forEach(s => { STREAMERS[s.id] = s; });
  SPECIAL_DAYS = days || [];
  RANGE_EVENTS = ranges || [];
  WEEKLY = weekly || [];
  renderMonths();
  renderWeek();
}

loadData().catch(err => {
  document.getElementById('months').innerHTML = '<div class="note">데이터를 불러오지 못했어요.</div>';
  console.error(err);
});

const tabLinks = document.querySelectorAll('.tab-link');
tabLinks.forEach(btn => {
  btn.addEventListener('click', () => {
    tabLinks.forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.target).classList.add('active');
  });
});
</script>
</body>
</html>
