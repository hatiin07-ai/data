<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=760" />
<title>버추얼 연간 캘린더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --paper:#fbf7f2;
    --ink:#2c2622;
    --ink-soft:#7d7168;
    --line:#e8e0d6;
    --card:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);}
  body{
    font-family:'Gowun Dodum', sans-serif;
    width:760px;
    margin:0 auto;
    padding:40px 28px 80px;
  }
  h1,h2,.month-name{font-family:'Jua', sans-serif; font-weight:400;}

  .top{ text-align:center; margin-bottom:26px; }
  .top h1{ font-size:34px; margin:0; }

  .streamer-strip{
    display:flex; flex-wrap:wrap; justify-content:center; gap:8px;
    margin:0 0 24px;
  }
  .streamer-chip{
    display:flex; align-items:center; gap:7px;
    padding:8px 13px; border-radius:20px; border:1px solid var(--line);
    background:var(--card); text-decoration:none; color:var(--ink);
    font-size:14px; cursor:pointer; transition:transform .12s ease, box-shadow .12s ease;
  }
  .streamer-chip:hover{ transform:translateY(-1px); box-shadow:0 3px 10px rgba(0,0,0,.06); }
  .streamer-chip .live-dot{ width:8px; height:8px; border-radius:50%; background:#c9c2b8; flex:none; }
  .streamer-chip.on .live-dot{ background:#3fbf6a; box-shadow:0 0 0 3px rgba(63,191,106,.18); }
  .streamer-chip .status-word{ font-size:11px; color:var(--ink-soft); }
  .streamer-chip.on .status-word{ color:#2f9e56; font-weight:600; }

  .tabs{ display:flex; justify-content:center; gap:10px; margin:0 0 26px; }
  .tab-link{
    font-family:'Jua', sans-serif; font-size:16px; text-decoration:none;
    color:var(--ink-soft); background:var(--card); border:1px solid var(--line);
    padding:11px 22px; border-radius:20px; transition:all .15s ease;
    cursor:pointer; -webkit-appearance:none; appearance:none;
  }
  .tab-link:hover{ background:#f2ece3; }
  .tab-link.active{ background:var(--ink); color:#fff; border-color:var(--ink); }

  .panel{ display:none; }
  .panel.active{ display:block; }

  .section-title{
    display:flex; align-items:baseline; gap:10px;
    margin:0 0 16px;
  }
  .section-title h2{ font-size:24px; margin:0; }
  .section-title .sub{ font-size:15px; color:var(--ink-soft); }
  .section-title::after{
    content:""; flex:1; height:1px; background:var(--line);
  }

  .month-block{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:18px 20px 20px; margin-bottom:16px;
  }

  .week-table{ width:100%; border-collapse:separate; border-spacing:0 7px; font-size:16px; }
  .week-table th{ font-size:14px; color:var(--ink-soft); font-weight:400; padding-bottom:6px; }
  .week-table th:first-child, .week-table td:first-child{ text-align:left; width:64px; }
  .week-table td{ text-align:center; vertical-align:middle; padding:3px; }
  .week-table th.today-col{ color:var(--ink); font-weight:700; position:relative; }
  .week-table th.today-col::after{ content:'오늘'; display:block; font-size:10px; font-weight:400; color:#c07a2f; margin-top:1px; }
  .week-table td.today-col{ background:#fdefd8; border-radius:10px; }
  .name-cell{ display:flex; align-items:center; gap:6px; font-size:16px; }
  .dot{ width:11px; height:11px; border-radius:50%; flex:none; display:inline-block; }

  .list-table{ width:100%; table-layout:fixed; border-collapse:separate; border-spacing:0 8px; font-size:17px; }
  .list-table th{ text-align:center; font-size:14px; color:var(--ink-soft); font-weight:400; padding:0 12px 6px; }
  .list-table td{ padding:13px 12px; vertical-align:middle; text-align:center; }
  .list-table th:nth-child(1), .list-table td:nth-child(1){ width:22%; }
  .list-table th:nth-child(2), .list-table td:nth-child(2){ width:40%; }
  .list-table th:nth-child(3), .list-table td:nth-child(3){ width:38%; }
  .list-table tbody tr{ background:var(--card); }
  .list-table tbody td:first-child{ border-top:1px solid var(--line); border-bottom:1px solid var(--line); border-left:1px solid var(--line); border-radius:12px 0 0 12px; white-space:nowrap; color:var(--ink-soft); }
  .list-table tbody td:last-child{ border-top:1px solid var(--line); border-bottom:1px solid var(--line); border-right:1px solid var(--line); border-radius:0 12px 12px 0; }
  .list-table tbody td:nth-child(2){ border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .list-table .name-cell{ justify-content:center; }
  .sched-chip{
    display:inline-block; min-width:60px; padding:7px 6px; border-radius:10px;
    font-size:15px; color:var(--ink); line-height:1.2;
  }
  .sched-chip.rest{ background:var(--line); color:var(--ink-soft); }
  .sched-chip.none{ background:transparent; color:#c8c0b6; font-size:15px; }
  .row-wrap{ background:var(--card); }
  .row-wrap td{ border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .row-wrap td:first-child{ border-left:1px solid var(--line); border-radius:12px 0 0 12px; }
  .row-wrap td:last-child{ border-right:1px solid var(--line); border-radius:0 12px 12px 0; }

  .note{ font-size:14px; color:var(--ink-soft); margin-top:14px; line-height:1.6; text-align:center; }
  .loading{ text-align:center; color:var(--ink-soft); font-size:15px; padding:40px 0; }
</style>
</head>
<body>

  <div class="top">
    <h1>버추얼 연간 캘린더</h1>
  </div>

  <div class="streamer-strip" id="streamerStrip"></div>

  <nav class="tabs">
    <button class="tab-link active" data-target="panelCal">일정</button>
    <button class="tab-link" data-target="panelSched">방송 시간표</button>
  </nav>

  <div id="panelCal" class="panel active">
    <div class="section-title">
      <h2>일정</h2>
      <span class="sub">생일 · 데뷔 주년 · 기간 일정</span>
    </div>
    <div class="month-block">
      <table class="list-table">
        <thead><tr><th>날짜</th><th>스트리머</th><th>구분</th></tr></thead>
        <tbody id="daysListBody"><tr><td colspan="3" class="loading">불러오는 중…</td></tr></tbody>
      </table>
    </div>
  </div>

  <div id="panelSched" class="panel">
    <div class="section-title">
      <h2>주간 방송 시간표</h2>
      <span class="sub">정규 방송 · 휴방</span>
    </div>
    <div class="month-block">
      <table class="week-table">
        <thead>
          <tr>
            <th></th>
            <th id="wkTh0">월</th><th id="wkTh1">화</th><th id="wkTh2">수</th><th id="wkTh3">목</th><th id="wkTh4">금</th><th id="wkTh5">토</th><th id="wkTh6">일</th>
          </tr>
        </thead>
        <tbody id="weekBody"><tr><td colspan="8" class="loading">불러오는 중…</td></tr></tbody>
      </table>
    </div>
  </div>

<script src="js/supabase-config.js"></script>
<script>
let STREAMERS = {};
let SPECIAL_DAYS = [];
let RANGE_EVENTS = [];
let WEEKLY = [];
const WEEKDAYS = ['월','화','수','목','금','토','일'];

function lighten(hex, amt=0.62){
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  const mix = c => Math.round(c + (255 - c) * amt);
  return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
}
function kstTodayDowIdx(){
  const n = new Date();
  const utcMs = n.getTime() + n.getTimezoneOffset() * 60000;
  const kst = new Date(utcMs + 9 * 3600000);
  return (kst.getDay() + 6) % 7; // 0=월 ... 6=일, 브라우저 시간대 무관 KST 고정
}

function renderDaysList(){
  const dayItems = SPECIAL_DAYS.map(e => {
    const s = STREAMERS[e.streamer_id] || { name:'?', color:'#999' };
    const typeWord = e.type === 'birthday' ? '생일' : '주년';
    return {
      sortKey: e.month * 100 + e.day,
      dateLabel: `${e.month}/${e.day}`,
      name: s.name,
      color: s.color,
      typeWord
    };
  });
  const rangeItems = RANGE_EVENTS.map(r => {
    const [sy, sm, sd] = r.start_date.split('-').map(Number);
    const [, em, ed] = r.end_date.split('-').map(Number);
    const s = r.streamer_id ? (STREAMERS[r.streamer_id] || { name:'?', color:'#999' }) : null;
    return {
      sortKey: sm * 100 + sd,
      dateLabel: (sm === em && sd === ed) ? `${sm}/${sd}` : `${sm}/${sd}~${em}/${ed}`,
      name: s ? s.name : (r.custom_name || '기간 일정'),
      color: s ? s.color : '#8a8578',
      typeWord: r.label
    };
  });
  const sorted = dayItems.concat(rangeItems).sort((a,b) => a.sortKey - b.sortKey);

  const tbody = document.getElementById('daysListBody');
  if(!sorted.length){
    tbody.innerHTML = `<tr><td colspan="3" class="loading">등록된 일정이 없어요.</td></tr>`;
    return;
  }
  tbody.innerHTML = sorted.map(item => `<tr>
      <td>${item.dateLabel}</td>
      <td><span class="name-cell"><span class="dot" style="background:${item.color}"></span>${item.name}</span></td>
      <td>${item.typeWord}</td>
    </tr>`).join('');
}

function renderWeek(){
  const streamers = Object.values(STREAMERS);
  const todayIdx = kstTodayDowIdx(); // 0=월 ... 6=일 (KST 기준)
  for(let i=0;i<7;i++){
    const th = document.getElementById('wkTh'+i);
    if(th) th.classList.toggle('today-col', i === todayIdx);
  }
  const body = document.getElementById('weekBody');
  body.innerHTML = streamers.map(s => {
    const cells = WEEKDAYS.map((_, wd) => {
      const cls = wd === todayIdx ? ' class="today-col"' : '';
      const row = WEEKLY.find(w => w.streamer_id === s.id && w.weekday === wd);
      if(!row) return `<td${cls}><span class="sched-chip none">-</span></td>`;
      if(row.is_rest) return `<td${cls}><span class="sched-chip rest">휴방</span></td>`;
      const t = row.time ? row.time.slice(0,5) : '-';
      return `<td${cls}><span class="sched-chip" style="background:${lighten(s.color)}">${t}</span></td>`;
    }).join('');
    return `<tr class="row-wrap">
      <td><span class="name-cell"><span style="width:10px;height:10px;border-radius:50%;background:${s.color};display:inline-block;flex:none"></span>${s.name}</span></td>
      ${cells}
    </tr>`;
  }).join('');
}

function renderStreamerStrip(){
  const el = document.getElementById('streamerStrip');
  const streamers = Object.values(STREAMERS);
  el.innerHTML = streamers.map(s => {
    const tag = s.channel_url ? 'a' : 'span';
    const hrefAttr = s.channel_url ? ` href="${s.channel_url}" target="_blank" rel="noopener"` : '';
    return `<${tag} class="streamer-chip" id="chip-${s.id}"${hrefAttr}>
      <span class="live-dot"></span>
      <span style="color:${s.color}; font-weight:600;">${s.name}</span>
      <span class="status-word">OFF</span>
    </${tag}>`;
  }).join('');

  streamers.filter(s => s.soop_id).forEach(s => {
    fetch(`/api/soop-status?id=${encodeURIComponent(s.soop_id)}`)
      .then(r => r.json())
      .then(data => {
        const chip = document.getElementById('chip-'+s.id);
        if(!chip) return;
        if(data.isLive){
          chip.classList.add('on');
          chip.querySelector('.status-word').textContent = 'ON AIR';
        }
      })
      .catch(() => {});
  });
}

async function loadData(){
  const sb = initSupabase();
  const [{ data: streamers }, { data: days }, { data: ranges }, { data: weekly }] = await Promise.all([
    sb.from('streamers').select('*').order('sort_order'),
    sb.from('special_days').select('*'),
    sb.from('range_events').select('*'),
    sb.from('weekly_schedule').select('*')
  ]);
  STREAMERS = {};
  (streamers || []).forEach(s => { STREAMERS[s.id] = s; });
  SPECIAL_DAYS = days || [];
  RANGE_EVENTS = ranges || [];
  WEEKLY = weekly || [];
  renderStreamerStrip();
  renderDaysList();
  renderWeek();
}

loadData().catch(err => {
  document.getElementById('daysListBody').innerHTML = '<tr><td colspan="3" class="note">데이터를 불러오지 못했어요.</td></tr>';
  console.error(err);
});

const tabLinks = document.querySelectorAll('.tab-link');
tabLinks.forEach(btn => {
  btn.addEventListener('click', () => {
    tabLinks.forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.target).classList.add('active');
  });
});
</script>
</body>
</html>
