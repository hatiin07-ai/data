<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=760" />
<title>버추얼 연간 캘린더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --paper:#fbf7f2;
    --ink:#2c2622;
    --ink-soft:#7d7168;
    --line:#e8e0d6;
    --card:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);}
  html{ scroll-behavior:smooth; }
  body{
    font-family:'Gowun Dodum', sans-serif;
    width:760px;
    margin:0 auto;
    padding:40px 28px 80px;
  }
  h1,h2,.month-name{font-family:'Jua', sans-serif; font-weight:400;}

  .top{ text-align:center; margin-bottom:30px; }
  .eyebrow{ font-size:13px; letter-spacing:.14em; color:var(--ink-soft); margin-bottom:6px; }
  .top h1{ font-size:30px; margin:0 0 8px; }
  .top p{ font-size:14px; color:var(--ink-soft); margin:0; }

  .legend{
    display:flex; flex-wrap:wrap; gap:8px 14px;
    justify-content:center;
    padding:16px 18px; margin-bottom:34px;
    background:var(--card); border:1px solid var(--line); border-radius:16px;
  }
  .legend-item{ display:flex; align-items:center; gap:6px; font-size:13px; color:var(--ink); }
  .dot{ width:10px; height:10px; border-radius:50%; flex:none; }

  .chip-legend{
    display:flex; justify-content:center; gap:18px; margin:-20px 0 30px;
    font-size:11.5px; color:var(--ink-soft);
  }
  .chip-legend span{ display:flex; align-items:center; gap:5px; }

  .section-title{
    display:flex; align-items:baseline; gap:10px;
    margin:0 0 16px;
  }
  .section-title h2{ font-size:20px; margin:0; }
  .section-title .sub{ font-size:12px; color:var(--ink-soft); }
  .section-title::after{
    content:""; flex:1; height:1px; background:var(--line);
  }

  .pager{
    display:flex; align-items:center; justify-content:center; gap:22px;
    margin-bottom:14px;
  }
  .pager-btn{
    width:38px; height:38px; border-radius:50%; border:1px solid var(--line);
    background:var(--card); color:var(--ink); font-size:20px; line-height:1;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background .15s ease;
  }
  .pager-btn:hover{ background:#f2ece3; }
  .pager-label{ display:flex; align-items:center; gap:10px; font-family:'Jua', sans-serif; font-size:22px; min-width:170px; justify-content:center; }
  .today-btn{
    font-family:'Gowun Dodum', sans-serif; font-size:11.5px; color:var(--ink-soft);
    background:var(--card); border:1px solid var(--line); border-radius:20px;
    padding:4px 10px; cursor:pointer;
  }
  .today-btn:hover{ background:#f2ece3; }

  .month-block{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:18px 20px 20px; margin-bottom:16px;
  }
  .month-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px; }
  .month-name{ font-size:18px; }
  .month-count{ font-size:12px; color:var(--ink-soft); }

  .dow-row, .cal-grid{
    display:grid; grid-template-columns:repeat(7,1fr); gap:4px;
  }
  .dow-row{ margin-bottom:6px; }
  .dow{ text-align:center; font-size:11px; color:var(--ink-soft); }
  .dow.sun{ color:#d9686f; } .dow.sat{ color:#4f8ef7; }

  .cell{
    min-height:56px; border-radius:9px; padding:4px 4px 5px;
    background:#faf8f4; position:relative;
  }
  .cell.empty{ background:transparent; }
  .cell .d{ font-size:10px; color:var(--ink-soft); }
  .cell.has-event{ background:#fffaf3; box-shadow:inset 0 0 0 1px var(--line); }
  .cell.today .d{ color:#fff; background:var(--ink); border-radius:50%; padding:1px 5px; }

  .chip{
    margin-top:3px; font-size:9.5px; line-height:1.25;
    padding:2px 5px; border-radius:20px; color:#fff;
    display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .chip.range{ box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.7); }

  .note{ font-size:11.5px; color:var(--ink-soft); margin-top:14px; line-height:1.6; text-align:center; }
  footer{ text-align:center; margin-top:60px; font-size:12px; color:var(--ink-soft); }
  .loading{ text-align:center; color:var(--ink-soft); font-size:13px; padding:40px 0; }
</style>
</head>
<body>

  <div class="top">
    <div class="eyebrow">ARCHITECT CREATIVE · VTUBER SCHEDULE HUB</div>
    <h1>버추얼 연간 캘린더</h1>
    <p>생일 · 데뷔 주년을 한눈에</p>
  </div>

  <div class="legend" id="legend"><div class="loading">불러오는 중…</div></div>
  <div class="chip-legend">
    <span>🎂🎉 생일·주년</span>
    <span>🧳 기간 일정(휴가 등)</span>
  </div>

  <div class="section-title">
    <h2>🎂 기념일 캘린더</h2>
    <span class="sub">생일 · 데뷔 주년</span>
  </div>
  <div class="pager">
    <button id="prevBtn" class="pager-btn" aria-label="이전 달">‹</button>
    <div class="pager-label">
      <span id="pagerYear"></span>
      <button id="todayBtn" class="today-btn">오늘</button>
    </div>
    <button id="nextBtn" class="pager-btn" aria-label="다음 달">›</button>
  </div>
  <div id="months"><div class="loading">불러오는 중…</div></div>

  <footer>© 아키텍트 크리에이티브 · profile@soop.info</footer>

<script src="js/supabase-config.js"></script>
<script>
const DOW = ['월','화','수','목','금','토','일'];
const today = new Date();
let cur = { year: today.getFullYear(), month: today.getMonth() + 1 };

let STREAMERS = {};
let SPECIAL_DAYS = [];
let RANGE_EVENTS = [];

function daysInMonth(y,m){ return new Date(y, m, 0).getDate(); }
function firstDowMon0(y,m){
  const jsDow = new Date(y, m-1, 1).getDay();
  return (jsDow + 6) % 7;
}

function renderLegend(){
  const el = document.getElementById('legend');
  el.innerHTML = Object.values(STREAMERS).map(s =>
    `<span class="legend-item"><span class="dot" style="background:${s.color}"></span>${s.name}</span>`
  ).join('');
}

function renderMonths(){
  const { year, month } = cur;
  document.getElementById('pagerYear').textContent = `${year}년 ${month}월`;

  const total = daysInMonth(year, month);
  const startEmpty = firstDowMon0(year, month);
  const events = SPECIAL_DAYS.filter(e => e.month === month);
  const isCurMonth = year === today.getFullYear() && month === (today.getMonth() + 1);

  let cells = '';
  for(let i=0;i<startEmpty;i++) cells += `<div class="cell empty"></div>`;
  for(let day=1; day<=total; day++){
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dayEvents = events.filter(e => e.day === day);
    const dayRanges = RANGE_EVENTS.filter(r => dateStr >= r.start_date && dateStr <= r.end_date);
    const hasEvent = dayEvents.length > 0 || dayRanges.length > 0;
    const isToday = isCurMonth && day === today.getDate();
    const chips = dayEvents.map(e => {
      const s = STREAMERS[e.streamer_id] || { name:'?', color:'#999' };
      const icon = e.type === 'birthday' ? '🎂' : '🎉';
      return `<span class="chip" style="background:${s.color}">${icon} ${s.name}</span>`;
    }).join('') + dayRanges.map(r => {
      const s = STREAMERS[r.streamer_id] || { name:'?', color:'#999' };
      return `<span class="chip range" style="background:${s.color}">🧳 ${s.name} ${r.label}</span>`;
    }).join('');
    cells += `<div class="cell${hasEvent?' has-event':''}${isToday?' today':''}"><span class="d">${day}</span>${chips}</div>`;
  }

  const monthStart = `${year}-${String(month).padStart(2,'0')}-01`;
  const monthEnd = `${year}-${String(month).padStart(2,'0')}-${String(total).padStart(2,'0')}`;
  const monthRanges = RANGE_EVENTS.filter(r => r.start_date <= monthEnd && r.end_date >= monthStart);
  const summaryItems = events.map(e=>e.label || '').concat(monthRanges.map(r => `${(STREAMERS[r.streamer_id]||{}).name || ''} ${r.label}`));

  document.getElementById('months').innerHTML = `
    <div class="month-block">
      <div class="month-head">
        <span class="month-name">${month}월</span>
        <span class="month-count">${summaryItems.length ? summaryItems.join(' · ') : '기념일 없음'}</span>
      </div>
      <div class="dow-row">
        ${DOW.map((d,i)=>`<span class="dow${i===5?' sat':''}${i===6?' sun':''}">${d}</span>`).join('')}
      </div>
      <div class="cal-grid">${cells}</div>
    </div>`;
}

function changeMonth(delta){
  let m = cur.month + delta;
  let y = cur.year;
  if(m > 12){ m = 1; y += 1; }
  if(m < 1){ m = 12; y -= 1; }
  cur = { year: y, month: m };
  renderMonths();
}

document.getElementById('prevBtn').addEventListener('click', () => changeMonth(-1));
document.getElementById('nextBtn').addEventListener('click', () => changeMonth(1));
document.getElementById('todayBtn').addEventListener('click', () => {
  cur = { year: today.getFullYear(), month: today.getMonth() + 1 };
  renderMonths();
});

async function loadData(){
  const sb = initSupabase();
  const [{ data: streamers }, { data: days }, { data: ranges }] = await Promise.all([
    sb.from('streamers').select('*').order('sort_order'),
    sb.from('special_days').select('*'),
    sb.from('range_events').select('*')
  ]);
  STREAMERS = {};
  (streamers || []).forEach(s => { STREAMERS[s.id] = s; });
  SPECIAL_DAYS = days || [];
  RANGE_EVENTS = ranges || [];
  renderLegend();
  renderMonths();
}

loadData().catch(err => {
  document.getElementById('legend').innerHTML = '<div class="note">데이터를 불러오지 못했어요.</div>';
  console.error(err);
});
</script>
</body>
</html>
